services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: syndicate
      POSTGRES_PASSWORD: syndicate
      POSTGRES_DB: syndicate
    ports:
      - "5432:5432"
    volumes:
      - syndicate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syndicate"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  syndicate_pgdata:
